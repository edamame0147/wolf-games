<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Werewolf Online</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --main-bg: #121212; --panel-bg: #1e1e1e; --accent: #e53935; --text: #e0e0e0; --input-bg: #2c2c2c; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: sans-serif; margin: 0; background-color: #000; color: var(--text); height: 100vh; display: flex; justify-content: center; overflow: hidden; }

        #app-container { width: 100%; max-width: 500px; background: var(--main-bg); height: 100%; display: flex; flex-direction: column; position: relative; }

        /* ログイン */
        #login-area { padding: 20px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
        .login-card { background: var(--panel-bg); padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* ゲーム画面 */
        #game-area { display: none; flex-direction: column; height: 100%; }

        /* ヘッダー */
        .header { background: var(--panel-bg); padding: 5px 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; height: 38px; }
        .header h3 { margin: 0; font-size: 0.9em; color: var(--accent); }

        /* 役職バー */
        #my-role-bar { background: #263238; color: #ffeb3b; padding: 5px 10px; text-align: center; font-size: 0.85em; border-bottom: 1px solid #444; display: none; }

        /* タブ */
        .tab-nav { display: flex; background: var(--panel-bg); border-bottom: 1px solid #333; height: 42px; }
        .tab-btn { flex: 1; border: none; background: none; color: #777; font-weight: bold; font-size: 0.85em; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .tab-btn.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

        /* コンテンツ */
        .content { flex-grow: 1; overflow-y: auto; display: none; padding-bottom: 80px; } 
        .content.active { display: block; }

        /* チャット */
        .chat-list { padding: 12px; display: flex; flex-direction: column; gap: 8px; }
        .msg { display: flex; flex-direction: column; max-width: 85%; }
        .msg.left { align-self: flex-start; }
        .msg.right { align-self: flex-end; align-items: flex-end; }
        .sender { font-size: 0.7em; margin-bottom: 1px; color: #aaa; }
        .bubble { padding: 8px 14px; border-radius: 14px; font-size: 0.95em; word-wrap: break-word; line-height: 1.4; }
        .left .bubble { background: #333; border-bottom-left-radius: 2px; }
        .right .bubble { background: var(--accent); color: white; border-bottom-right-radius: 2px; }

        /* 設定 */
        .scroll-box { padding: 10px; }
        .card { background: var(--panel-bg); border-radius: 12px; padding: 12px; margin-bottom: 12px; border: 1px solid #333; }
        .card-title { font-size: 0.75em; color: #888; margin-bottom: 10px; font-weight: bold; text-transform: uppercase; }
        .setting-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font-size: 0.9em; }
        .setting-item input[type="number"] { width: 55px; padding: 4px; background: #2c2c2c; color: white; border: 1px solid #444; border-radius: 5px; text-align: center; }

        /* フローティング入力エリア（少し上に浮かせた修正箇所） */
        .input-area { 
            position: absolute; 
            bottom: 12px; /* 下端からの距離 */
            left: 10px; 
            right: 10px; 
            width: calc(100% - 20px);
            background: var(--panel-bg); 
            padding: 6px 10px; 
            display: flex; 
            gap: 8px; 
            border: 1px solid #444; 
            border-radius: 25px; 
            align-items: center; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.6); 
            z-index: 10;
        }
        .input-area input { flex-grow: 1; border: none; background: transparent; color: white; font-size: 16px; height: 38px; outline: none; }
        
        /* ボタン */
        .btn { border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: white; padding: 0 18px; height: 34px; font-size: 0.9em; border-radius: 17px; }
        .btn-sub { background: #444; color: #ccc; font-size: 0.7em; padding: 3px 8px; border-radius: 6px; }
        .btn-outline { background: none; border: 1px solid var(--accent); color: var(--accent); width: 100%; padding: 12px; margin-top: 8px; font-size: 0.95em; }

        .p-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #222; font-size: 0.95em; }
    </style>
</head>
<body>
    <div id="app-container">
        <div id="login-area">
            <div class="login-card">
                <h1 style="color:var(--accent); margin:0 0 20px 0; letter-spacing: 3px;">WEREWOLF</h1>
                <input type="text" id="roomId" placeholder="ルームID">
                <input type="text" id="playerName" placeholder="名前">
                <button class="btn btn-primary" onclick="joinRoom()" style="width: 100%; margin-top: 15px; height: 48px; border-radius: 12px;">ゲームに入る</button>
            </div>
        </div>

        <div id="game-area">
            <div class="header">
                <h3 id="display-room"></h3>
                <button class="btn btn-sub" onclick="location.reload()">退室</button>
            </div>

            <div id="my-role-bar"></div>

            <div class="tab-nav">
                <button class="tab-btn active" id="tab-chat-btn" onclick="switchTab('chat')">チャット</button>
                <button class="tab-btn" id="tab-set-btn" onclick="switchTab('settings')">設定 / 参加者</button>
            </div>

            <div id="sect-chat" class="content active">
                <div class="chat-list" id="chat-box"></div>
            </div>

            <div id="sect-settings" class="content">
                <div class="scroll-box">
                    <div id="gm-only-area" style="display:none;">
                        <div class="card">
                            <div class="card-title">GM管理パネル</div>
                            <div class="setting-item"><span>人狼/狂人/占い/狩人/市民</span>
                                <div style="display:flex; gap:3px;">
                                    <input type="number" id="s-wolf" value="1">
                                    <input type="number" id="s-madman" value="0">
                                    <input type="number" id="s-seer" value="1">
                                    <input type="number" id="s-hunter" value="0">
                                    <input type="number" id="s-villager" value="2">
                                </div>
                            </div>
                            <div class="setting-item"><span>狼・狂人の相互認識</span><input type="checkbox" id="s-know" onchange="updateSettings()"></div>
                            <button class="btn btn-outline" onclick="startGame()">役職を配布する</button>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-title">参加プレイヤー</div>
                        <div id="player-list"></div>
                    </div>
                </div>
            </div>

            <div class="input-area" id="footer-input">
                <input type="text" id="chat-input" placeholder="メッセージを入力..." onkeypress="if(event.key === 'Enter') sendChat()">
                <button class="btn btn-primary" onclick="sendChat()">送信</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let currentRoom = "", myName = "", isGM = false;

        function getNameColor(name) {
            let hash = 0;
            for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
            return `hsl(${Math.abs(hash) % 360}, 60%, 75%)`;
        }

        function switchTab(target) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            if(target === 'chat') {
                document.getElementById('tab-chat-btn').classList.add('active');
                document.getElementById('sect-chat').classList.add('active');
                document.getElementById('footer-input').style.display = 'flex';
            } else {
                document.getElementById('tab-set-btn').classList.add('active');
                document.getElementById('sect-settings').classList.add('active');
                document.getElementById('footer-input').style.display = 'none';
            }
        }

        function joinRoom() {
            currentRoom = document.getElementById('roomId').value;
            myName = document.getElementById('playerName').value;
            if(!currentRoom || !myName) return alert("入室情報を入力してください");
            socket.emit('join-room', { roomId: currentRoom, playerName: myName });
            document.getElementById('login-area').style.display = 'none';
            document.getElementById('game-area').style.display = 'flex';
            document.getElementById('display-room').innerText = "ROOM: " + currentRoom;
        }

        function updateSettings() {
            if(!isGM) return;
            socket.emit('update-settings', { 
                roomId: currentRoom, 
                settings: {
                    wolf: parseInt(document.getElementById('s-wolf').value) || 0,
                    madman: parseInt(document.getElementById('s-madman').value) || 0,
                    hunter: parseInt(document.getElementById('s-hunter').value) || 0,
                    seer: parseInt(document.getElementById('s-seer').value) || 0,
                    villager: parseInt(document.getElementById('s-villager').value) || 0,
                    knowEachOther: document.getElementById('s-know').checked
                }
            });
        }

        function startGame() {
            if(confirm("この設定で役職を配布しますか？")) {
                updateSettings(); 
                socket.emit('start-game', { roomId: currentRoom });
            }
        }

        function transferGM(id) {
            if(confirm("GM権限をこのプレイヤーに渡しますか？")) socket.emit('transfer-gm', { roomId: currentRoom, newGmId: id });
        }

        function sendChat() {
            const input = document.getElementById('chat-input');
            if(!input.value) return;
            socket.emit('send-chat', { roomId: currentRoom, message: input.value, playerName: myName });
            input.value = "";
        }

        socket.on('update-room', (data) => {
            isGM = data.gmId === socket.id;
            document.getElementById('gm-only-area').style.display = isGM ? 'block' : 'none';
            if(!isGM) {
                document.getElementById('s-wolf').value = data.settings.wolf;
                document.getElementById('s-madman').value = data.settings.madman;
                document.getElementById('s-seer').value = data.settings.seer;
                document.getElementById('s-hunter').value = data.settings.hunter;
                document.getElementById('s-villager').value = data.settings.villager;
                document.getElementById('s-know').checked = data.settings.knowEachOther;
            }
            const list = document.getElementById('player-list');
            list.innerHTML = "";
            data.players.forEach(p => {
                const item = document.createElement('div');
                item.className = 'p-item';
                const role = (isGM && p.role) ? `<span style="font-size:0.75em; color:#888;">[${p.role}]</span>` : "";
                const gm = p.isGM ? `<span style="background:gold; color:black; font-size:0.6em; padding:2px 4px; border-radius:4px; font-weight:bold; margin-right:4px;">GM</span>` : "";
                const btn = (isGM && !p.isGM) ? `<button class="btn btn-sub" onclick="transferGM('${p.id}')">GM譲渡</button>` : "";
                item.innerHTML = `<span>${gm}<span style="color:${getNameColor(p.name)}">${p.name}</span> ${role}</span>${btn}`;
                list.appendChild(item);
            });
        });

        socket.on('assign-role', (data) => {
            const bar = document.getElementById('my-role-bar');
            bar.style.display = 'block';
            bar.innerHTML = `役職: <strong>${data.role}</strong> <span style="font-size:0.85em; margin-left:8px; opacity:0.8;">${data.info || ''}</span>`;
        });

        socket.on('receive-chat', (data) => {
            const box = document.getElementById('chat-box');
            const isMe = data.senderId === socket.id;
            const div = document.createElement('div');
            div.className = `msg ${isMe ? 'right' : 'left'}`;
            const sender = isMe ? "" : `<span class="sender" style="color:${getNameColor(data.playerName)}">${data.playerName}</span>`;
            div.innerHTML = `${sender}<div class="bubble">${data.message}</div>`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        });
    </script>
</body>
</html>
