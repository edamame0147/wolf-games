<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Werewolf Online</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --main-bg: #121212; --panel-bg: #1e1e1e; --accent: #e53935; --text: #e0e0e0; --input-bg: #2c2c2c; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: sans-serif; background-color: #000; color: var(--text); height: 100vh; display: flex; justify-content: center; overflow: hidden; }

        #app-container { width: 100%; max-width: 500px; background: var(--main-bg); height: 100vh; display: flex; flex-direction: column; position: relative; }

        /* --- ログイン画面 (極限まで縮小) --- */
        #login-area { padding: 10px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .login-card { background: var(--panel-bg); padding: 15px; border-radius: 12px; width: 90%; max-width: 320px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .login-card h1 { color: var(--accent); font-size: 1.5rem; margin-bottom: 10px; letter-spacing: 2px; }
        .login-card input { width: 100%; padding: 8px 12px; margin-bottom: 8px; border-radius: 8px; border: 1px solid #444; background: var(--input-bg); color: white; font-size: 14px; outline: none; }
        .login-card .btn-enter { width: 100%; height: 40px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; }

        /* --- ゲーム画面 --- */
        #game-area { display: none; flex-direction: column; height: 100%; position: relative; }

        .header { background: var(--panel-bg); padding: 0 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; height: 32px; }
        .header h3 { font-size: 0.85em; color: var(--accent); }

        #my-role-bar { background: #263238; color: #ffeb3b; padding: 4px 10px; text-align: center; font-size: 0.8em; border-bottom: 1px solid #444; display: none; }

        .tab-nav { display: flex; background: var(--panel-bg); border-bottom: 1px solid #333; height: 36px; }
        .tab-btn { flex: 1; border: none; background: none; color: #777; font-weight: bold; font-size: 0.8em; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .tab-btn.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

        .content { flex-grow: 1; overflow-y: auto; display: none; padding-bottom: 75px; } 
        .content.active { display: block; }

        .chat-list { padding: 8px; display: flex; flex-direction: column; gap: 4px; }
        .msg { display: flex; flex-direction: column; max-width: 85%; }
        .msg.left { align-self: flex-start; }
        .msg.right { align-self: flex-end; align-items: flex-end; }
        .sender { font-size: 0.65em; margin-bottom: 1px; color: #aaa; }
        .bubble { padding: 6px 12px; border-radius: 12px; font-size: 0.9em; word-wrap: break-word; line-height: 1.3; }
        .left .bubble { background: #333; border-bottom-left-radius: 2px; }
        .right .bubble { background: var(--accent); color: white; border-bottom-right-radius: 2px; }

        /* 設定 */
        .scroll-box { padding: 8px; }
        .card { background: var(--panel-bg); border-radius: 8px; padding: 8px; margin-bottom: 8px; border: 1px solid #333; }
        .card-title { font-size: 0.7em; color: #888; margin-bottom: 6px; font-weight: bold; }
        .setting-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; font-size: 0.85em; }
        .setting-item input[type="number"] { width: 45px; padding: 2px; background: #2c2c2c; color: white; border: 1px solid #444; border-radius: 4px; text-align: center; font-size: 12px; }

        /* フローティング入力エリア */
        .input-area { 
            position: absolute; 
            bottom: 10px; 
            left: 8px; 
            right: 8px; 
            width: calc(100% - 16px);
            background: var(--panel-bg); 
            padding: 4px 10px; 
            display: flex; 
            gap: 6px; 
            border: 1px solid #444; 
            border-radius: 20px; 
            align-items: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.6); 
            z-index: 10;
        }
        .input-area input { flex-grow: 1; border: none; background: transparent; color: white; font-size: 15px; height: 34px; outline: none; }
        
        .btn { border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-primary { background: var(--accent); color: white; padding: 0 15px; height: 30px; font-size: 0.85em; border-radius: 15px; }
        .btn-sub { background: #444; color: #ccc; font-size: 0.65em; padding: 2px 6px; border-radius: 4px; }
        .btn-outline { background: none; border: 1px solid var(--accent); color: var(--accent); width: 100%; padding: 8px; margin-top: 5px; font-size: 0.85em; }

        .p-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #222; font-size: 0.85em; }
    </style>
</head>
<body>
    <div id="app-container">
        <div id="login-area">
            <div class="login-card">
                <h1>WEREWOLF</h1>
                <input type="text" id="roomId" placeholder="ルームID">
                <input type="text" id="playerName" placeholder="名前">
                <button class="btn-enter" onclick="joinRoom()">入室する</button>
            </div>
        </div>

        <div id="game-area">
            <div class="header">
                <h3 id="display-room"></h3>
                <button class="btn btn-sub" onclick="location.reload()">退室</button>
            </div>
            <div id="my-role-bar"></div>
            <div class="tab-nav">
                <button class="tab-btn active" id="tab-chat-btn" onclick="switchTab('chat')">チャット</button>
                <button class="tab-btn" id="tab-set-btn" onclick="switchTab('settings')">設定/リスト</button>
            </div>
            <div id="sect-chat" class="content active">
                <div class="chat-list" id="chat-box"></div>
            </div>
            <div id="sect-settings" class="content">
                <div class="scroll-box">
                    <div id="gm-only-area" style="display:none;">
                        <div class="card">
                            <div class="card-title">GM管理パネル</div>
                            <div class="setting-item"><span>人狼/狂/占/狩/市</span>
                                <div style="display:flex; gap:2px;">
                                    <input type="number" id="s-wolf" value="1">
                                    <input type="number" id="s-madman" value="0">
                                    <input type="number" id="s-seer" value="1">
                                    <input type="number" id="s-hunter" value="0">
                                    <input type="number" id="s-villager" value="2">
                                </div>
                            </div>
                            <div class="setting-item"><span>狼・狂の相互認識</span><input type="checkbox" id="s-know" onchange="updateSettings()"></div>
                            <button class="btn btn-outline" onclick="startGame()">役職を配布する</button>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-title">参加プレイヤー</div>
                        <div id="player-list"></div>
                    </div>
                </div>
            </div>
            <div class="input-area" id="footer-input">
                <input type="text" id="chat-input" placeholder="入力..." onkeypress="if(event.key === 'Enter') sendChat()">
                <button class="btn btn-primary" onclick="sendChat()">送信</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let currentRoom = "", myName = "", isGM = false;

        function getNameColor(name) {
            let hash = 0;
            for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
            return `hsl(${Math.abs(hash) % 360}, 55%, 70%)`;
        }

        function switchTab(target) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            if(target === 'chat') {
                document.getElementById('tab-chat-btn').classList.add('active');
                document.getElementById('sect-chat').classList.add('active');
                document.getElementById('footer-input').style.display = 'flex';
            } else {
                document.getElementById('tab-set-btn').classList.add('active');
                document.getElementById('sect-settings').classList.add('active');
                document.getElementById('footer-input').style.display = 'none';
            }
        }

        function joinRoom() {
            currentRoom = document.getElementById('roomId').value;
            myName = document.getElementById('playerName').value;
            if(!currentRoom || !myName) return alert("入力してください");
            socket.emit('join-room', { roomId: currentRoom, playerName: myName });
            document.getElementById('login-area').style.display = 'none';
            document.getElementById('game-area').style.display = 'flex';
            document.getElementById('display-room').innerText = "ID: " + currentRoom;
        }

        function updateSettings() {
            if(!isGM) return;
            socket.emit('update-settings', { 
                roomId: currentRoom, 
                settings: {
                    wolf: parseInt(document.getElementById('s-wolf').value) || 0,
                    madman: parseInt(document.getElementById('s-madman').value) || 0,
                    hunter: parseInt(document.getElementById('s-hunter').value) || 0,
                    seer: parseInt(document.getElementById('s-seer').value) || 0,
                    villager: parseInt(document.getElementById('s-villager').value) || 0,
                    knowEachOther: document.getElementById('s-know').checked
                }
            });
        }

        function startGame() {
            if(confirm("開始しますか？")) {
                updateSettings(); 
                socket.emit('start-game', { roomId: currentRoom });
            }
        }

        function transferGM(id) {
            if(confirm("GMを交代しますか？")) socket.emit('transfer-gm', { roomId: currentRoom, newGmId: id });
        }

        function sendChat() {
            const input = document.getElementById('chat-input');
            if(!input.value) return;
            socket.emit('send-chat', { roomId: currentRoom, message: input.value, playerName: myName });
            input.value = "";
        }

        socket.on('update-room', (data) => {
            isGM = data.gmId === socket.id;
            document.getElementById('gm-only-area').style.display = isGM ? 'block' : 'none';
            if(!isGM) {
                document.getElementById('s-wolf').value = data.settings.wolf;
                document.getElementById('s-madman').value = data.settings.madman;
                document.getElementById('s-seer').value = data.settings.seer;
                document.getElementById('s-hunter').value = data.settings.hunter;
                document.getElementById('s-villager').value = data.settings.villager;
                document.getElementById('s-know').checked = data.settings.knowEachOther;
            }
            const list = document.getElementById('player-list');
            list.innerHTML = "";
            data.players.forEach(p => {
                const item = document.createElement('div');
                item.className = 'p-item';
                const role = (isGM && p.role) ? `<span style="font-size:0.7em; color:#888;">[${p.role}]</span>` : "";
                const gm = p.isGM ? `<span style="background:gold; color:black; font-size:0.6em; padding:1px 3px; border-radius:3px; font-weight:bold; margin-right:3px;">GM</span>` : "";
                const btn = (isGM && !p.isGM) ? `<button class="btn btn-sub" onclick="transferGM('${p.id}')">交代</button>` : "";
                item.innerHTML = `<span>${gm}<span style="color:${getNameColor(p.name)}">${p.name}</span> ${role}</span>${btn}`;
                list.appendChild(item);
            });
        });

        socket.on('assign-role', (data) => {
            const bar = document.getElementById('my-role-bar');
            bar.style.display = 'block';
            bar.innerHTML = `役職: <strong>${data.role}</strong> <small style="opacity:0.8;">${data.info || ''}</small>`;
        });

        socket.on('receive-chat', (data) => {
            const box = document.getElementById('chat-box');
            const isMe = data.senderId === socket.id;
            const div = document.createElement('div');
            div.className = `msg ${isMe ? 'right' : 'left'}`;
            const sender = isMe ? "" : `<span class="sender" style="color:${getNameColor(data.playerName)}">${data.playerName}</span>`;
            div.innerHTML = `${sender}<div class="bubble">${data.message}</div>`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        });
    </script>
</body>
</html>
