<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Werewolf Online</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { --main-bg: #121212; --panel-bg: #1e1e1e; --accent: #e53935; --text: #e0e0e0; --input-bg: #2c2c2c; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: sans-serif; background-color: #000; color: var(--text); height: 100vh; display: flex; justify-content: center; overflow: hidden; }

        #app-container { 
            width: 100%; 
            max-width: 500px; 
            background: var(--main-bg); 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            padding-top: 30px; 
        }

        /* ログイン画面 */
        #login-area { padding: 15px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .login-card { background: var(--panel-bg); padding: 30px 20px; border-radius: 20px; width: 90%; max-width: 360px; box-shadow: 0 8px 30px rgba(0,0,0,0.7); }
        .login-card h1 { color: var(--accent); font-size: 2.2rem; margin-bottom: 20px; letter-spacing: 4px; font-weight: 900; }
        .login-card input { width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 12px; border: 1px solid #444; background: var(--input-bg); color: white; font-size: 18px; outline: none; }
        .login-card .btn-enter { width: 100%; height: 55px; background: var(--accent); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 18px; }

        /* ゲーム画面共通 */
        #game-area { display: none; flex-direction: column; height: 100%; position: relative; }
        .header { background: var(--panel-bg); padding: 0 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; height: 50px; }
        .header h3 { font-size: 1.2em; color: var(--accent); font-weight: bold; }
        #my-role-bar { background: #263238; color: #ffeb3b; padding: 10px; text-align: center; font-size: 1.1em; border-bottom: 1px solid #444; display: none; }
        .tab-nav { display: flex; background: var(--panel-bg); border-bottom: 1px solid #333; height: 55px; }
        .tab-btn { flex: 1; border: none; background: none; color: #777; font-weight: bold; font-size: 1.1em; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .tab-btn.active { color: var(--accent); border-bottom: 3px solid var(--accent); background: rgba(255,255,255,0.03); }

        /* コンテンツ領域 */
        .content { flex-grow: 1; overflow-y: auto; display: none; padding-bottom: 120px; } 
        .content.active { display: block; }
        .chat-list { padding: 12px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 12px 18px; border-radius: 20px; font-size: 1.15em; word-wrap: break-word; line-height: 1.5; }
        .left .bubble { background: #333; border-bottom-left-radius: 4px; }
        .right .bubble { background: var(--accent); color: white; border-bottom-right-radius: 4px; }

        /* --- 設定エリア：縦並びへの修正 --- */
        .card { background: var(--panel-bg); border-radius: 15px; padding: 20px; margin: 15px; border: 1px solid #333; }
        .card-title { font-size: 0.9em; color: #888; margin-bottom: 15px; font-weight: bold; text-transform: uppercase; border-left: 3px solid var(--accent); padding-left: 10px; }
        
        .role-setting-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; background: #2a2a2a; padding: 10px 15px; border-radius: 12px; }
        .setting-row label { font-size: 1.1em; font-weight: bold; }
        .setting-row input[type="number"] { width: 80px; padding: 10px; background: #121212; color: white; border: 1px solid #444; border-radius: 8px; text-align: center; font-size: 1.2em; font-weight: bold; }
        
        /* 入力エリア (上に配置) */
        .input-area { 
            position: absolute; 
            bottom: 45px; 
            left: 10px; 
            right: 10px; 
            width: calc(100% - 20px);
            background: #2a2a2a; 
            padding: 10px 15px; 
            display: flex; 
            gap: 10px; 
            border: 2px solid #555; 
            border-radius: 40px; 
            align-items: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); 
            z-index: 10;
        }
        .input-area input { flex-grow: 1; border: none; background: transparent; color: white; font-size: 20px; height: 50px; outline: none; }
        .btn-primary { background: var(--accent); color: white; padding: 0 25px; height: 50px; font-size: 1.1em; border: none; border-radius: 25px; font-weight: bold; }

        .player-item { padding: 15px 0; border-bottom: 1px solid #333; font-size: 1.2em; }
    </style>
</head>
<body>
    <div id="app-container">
        <div id="login-area">
            <div class="login-card">
                <h1>WEREWOLF</h1>
                <input type="text" id="roomId" placeholder="ルームID">
                <input type="text" id="playerName" placeholder="名前">
                <button class="btn-enter" onclick="joinRoom()">ゲームを開始</button>
            </div>
        </div>

        <div id="game-area">
            <div class="header">
                <h3 id="display-room"></h3>
                <button onclick="location.reload()" style="background:#444; color:#ccc; border:none; padding:8px 15px; border-radius:8px; font-weight:bold;">退室</button>
            </div>
            <div id="my-role-bar"></div>
            <div class="tab-nav">
                <button class="tab-btn active" id="tab-chat-btn" onclick="switchTab('chat')">チャット</button>
                <button class="tab-btn" id="tab-set-btn" onclick="switchTab('settings')">設定 / リスト</button>
            </div>

            <div id="sect-chat" class="content active">
                <div class="chat-list" id="chat-box"></div>
            </div>

            <div id="sect-settings" class="content">
                <div id="gm-only-area" style="display:none;">
                    <div class="card">
                        <div class="card-title">役職の人数設定</div>
                        <div class="role-setting-list">
                            <div class="setting-row"><label>人狼</label><input type="number" id="s-wolf" value="1"></div>
                            <div class="setting-row"><label>狂人</label><input type="number" id="s-madman" value="0"></div>
                            <div class="setting-row"><label>占い師</label><input type="number" id="s-seer" value="1"></div>
                            <div class="setting-row"><label>狩人</label><input type="number" id="s-hunter" value="0"></div>
                            <div class="setting-row"><label>市民</label><input type="number" id="s-villager" value="2"></div>
                        </div>
                        <div class="setting-row" style="margin-bottom: 20px; background: none;">
                            <label>狼・狂人の相互認識</label>
                            <input type="checkbox" id="s-know" style="transform: scale(1.8);" onchange="updateSettings()">
                        </div>
                        <button onclick="startGame()" style="width:100%; padding:20px; background:var(--accent); color:white; border:none; border-radius:15px; font-weight:bold; font-size:1.2em; box-shadow: 0 4px 15px rgba(229,57,53,0.4);">この設定で役職を配布する</button>
                    </div>
                </div>
                <div class="card">
                    <div class="card-title">参加プレイヤー</div>
                    <div id="player-list"></div>
                </div>
            </div>

            <div class="input-area" id="footer-input">
                <input type="text" id="chat-input" placeholder="メッセージを入力..." onkeypress="if(event.key === 'Enter') sendChat()">
                <button class="btn-primary" onclick="sendChat()">送信</button>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        let currentRoom = "", myName = "", isGM = false;

        function getNameColor(name) {
            let hash = 0;
            for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
            return `hsl(${Math.abs(hash) % 360}, 65%, 75%)`;
        }

        function switchTab(target) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            if(target === 'chat') {
                document.getElementById('tab-chat-btn').classList.add('active');
                document.getElementById('sect-chat').classList.add('active');
                document.getElementById('footer-input').style.display = 'flex';
            } else {
                document.getElementById('tab-set-btn').classList.add('active');
                document.getElementById('sect-settings').classList.add('active');
                document.getElementById('footer-input').style.display = 'none';
            }
        }

        function joinRoom() {
            currentRoom = document.getElementById('roomId').value;
            myName = document.getElementById('playerName').value;
            if(!currentRoom || !myName) return alert("入力してください");
            socket.emit('join-room', { roomId: currentRoom, playerName: myName });
            document.getElementById('login-area').style.display = 'none';
            document.getElementById('game-area').style.display = 'flex';
            document.getElementById('display-room').innerText = "ID: " + currentRoom;
        }

        function updateSettings() {
            if(!isGM) return;
            socket.emit('update-settings', { 
                roomId: currentRoom, 
                settings: {
                    wolf: parseInt(document.getElementById('s-wolf').value) || 0,
                    madman: parseInt(document.getElementById('s-madman').value) || 0,
                    hunter: parseInt(document.getElementById('s-hunter').value) || 0,
                    seer: parseInt(document.getElementById('s-seer').value) || 0,
                    villager: parseInt(document.getElementById('s-villager').value) || 0,
                    knowEachOther: document.getElementById('s-know').checked
                }
            });
        }

        function startGame() {
            if(confirm("配役を開始しますか？")) {
                updateSettings();
                socket.emit('start-game', { roomId: currentRoom });
            }
        }

        function sendChat() {
            const input = document.getElementById('chat-input');
            if(!input.value) return;
            socket.emit('send-chat', { roomId: currentRoom, message: input.value, playerName: myName });
            input.value = "";
        }

        socket.on('update-room', (data) => {
            isGM = data.gmId === socket.id;
            document.getElementById('gm-only-area').style.display = isGM ? 'block' : 'none';
            if(!isGM) {
                document.getElementById('s-wolf').value = data.settings.wolf;
                document.getElementById('s-madman').value = data.settings.madman;
                document.getElementById('s-seer').value = data.settings.seer;
                document.getElementById('s-hunter').value = data.settings.hunter;
                document.getElementById('s-villager').value = data.settings.villager;
                document.getElementById('s-know').checked = data.settings.knowEachOther;
            }
            const list = document.getElementById('player-list');
            list.innerHTML = "";
            data.players.forEach(p => {
                const item = document.createElement('div');
                item.className = 'player-item';
                item.innerHTML = `<span style="color:${getNameColor(p.name)}">${p.isGM ? '👑 ' : ''}${p.name}</span>`;
                list.appendChild(item);
            });
        });

        socket.on('assign-role', (data) => {
            const bar = document.getElementById('my-role-bar');
            bar.style.display = 'block';
            bar.innerHTML = `あなたの役職: <strong>${data.role}</strong><br><small>${data.info || ''}</small>`;
        });

        socket.on('receive-chat', (data) => {
            const box = document.getElementById('chat-box');
            const isMe = data.senderId === socket.id;
            const div = document.createElement('div');
            div.style.display = "flex";
            div.style.flexDirection = "column";
            div.style.alignItems = isMe ? "flex-end" : "flex-start";
            div.className = isMe ? "right" : "left";
            const sender = isMe ? "" : `<span style="font-size:0.8em; color:#aaa; margin-bottom:2px; margin-left:8px;">${data.playerName}</span>`;
            div.innerHTML = `${sender}<div class="bubble">${data.message}</div>`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        });
    </script>
</body>
</html>
